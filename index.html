<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsureTech – Smart Insurance Platform</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0e7490;
    --primary-light: #22d3ee;
    --primary-dark: #0c4a6e;
    --accent: #0891b2;
    --teal: #14b8a6;
    --teal-light: #99f6e4;
    --sky: #e0f2fe;
    --sky-mid: #bae6fd;
    --surface: #f8fafc;
    --surface-2: #f0f9ff;
    --white: #ffffff;
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --border: #e2e8f0;
    --border-light: #f1f5f9;
    --success: #059669;
    --warning: #d97706;
    --danger: #dc2626;
    --shadow-sm: 0 1px 3px rgba(14,116,144,0.08), 0 1px 2px rgba(14,116,144,0.06);
    --shadow: 0 4px 16px rgba(14,116,144,0.10), 0 2px 8px rgba(14,116,144,0.06);
    --shadow-lg: 0 12px 40px rgba(14,116,144,0.14), 0 4px 16px rgba(14,116,144,0.08);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-lg: 24px;
    --radius-xl: 32px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    color: var(--text-primary);
    overflow-x: hidden;
  }

  /* ── NAV ── */
  .navbar-custom {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-light);
    padding: 14px 0;
    position: sticky;
    top: 0;
    z-index: 1000;
    transition: box-shadow 0.3s;
  }
  .navbar-custom.scrolled { box-shadow: var(--shadow); }
  .navbar-brand-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 1.4rem;
    color: var(--primary-dark);
    text-decoration: none;
  }
  .brand-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--primary), var(--teal));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 1.1rem;
  }
  .nav-link-custom {
    color: var(--text-secondary) !important;
    font-weight: 500;
    font-size: 0.9rem;
    padding: 6px 14px !important;
    border-radius: 8px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .nav-link-custom:hover, .nav-link-custom.active {
    color: var(--primary) !important;
    background: var(--sky);
  }
  .btn-nav-cta {
    background: linear-gradient(135deg, var(--primary), var(--teal));
    color: white;
    border: none;
    padding: 9px 22px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 4px 14px rgba(14,116,144,0.3);
  }
  .btn-nav-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(14,116,144,0.4); }

  /* ── PAGE SYSTEM ── */
  .page { display: none; animation: fadeIn 0.4s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* ── HERO ── */
  .hero-section {
    background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 40%, #ccfbf1 100%);
    padding: 90px 0 70px;
    position: relative;
    overflow: hidden;
  }
  .hero-section::before {
    content: '';
    position: absolute; top: -100px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(20,184,166,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero-section::after {
    content: '';
    position: absolute; bottom: -80px; left: -80px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(14,116,144,0.10) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: white;
    border: 1px solid var(--sky-mid);
    color: var(--primary);
    font-size: 0.82rem;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 50px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }
  .hero-badge .dot { width: 7px; height: 7px; background: var(--teal); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .hero-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(2.4rem, 5vw, 3.6rem);
    font-weight: 700;
    line-height: 1.12;
    color: var(--primary-dark);
    margin-bottom: 20px;
  }
  .hero-title em { font-style: italic; color: var(--primary); }
  .hero-subtitle {
    font-size: 1.08rem;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 36px;
    max-width: 520px;
  }
  .btn-primary-cta {
    background: linear-gradient(135deg, var(--primary), var(--teal));
    color: white; border: none;
    padding: 14px 32px; border-radius: 12px;
    font-weight: 600; font-size: 1rem;
    cursor: pointer; transition: all 0.25s;
    box-shadow: 0 6px 20px rgba(14,116,144,0.35);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary-cta:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(14,116,144,0.45); }
  .btn-outline-cta {
    background: white; color: var(--primary);
    border: 1.5px solid var(--primary);
    padding: 13px 28px; border-radius: 12px;
    font-weight: 600; font-size: 1rem;
    cursor: pointer; transition: all 0.25s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-outline-cta:hover { background: var(--sky); }
  .hero-stats {
    display: flex; gap: 36px; margin-top: 48px; flex-wrap: wrap;
  }
  
  .hero-stat-num {
    font-family: 'Fraunces', serif;
    font-size: 1.9rem; font-weight: 700;
    color: var(--primary-dark);
  }
  .hero-stat-label { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }
  .hero-visual {
    position: relative;
  }
  .hero-card-main {
    background: white;
    border-radius: var(--radius-lg);
    padding: 28px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border-light);
  }
  .hero-card-mini {
    position: absolute;
    background: white;
    border-radius: var(--radius);
    padding: 16px 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border-light);
    display: flex; align-items: center; gap: 12px;
  }
  .hero-card-mini.top-right { top: -20px; right: -20px; }
  .hero-card-mini.bottom-left { bottom: -20px; left: -20px; }
  .mini-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
  }
  .mini-icon.green { background: #dcfce7; color: #16a34a; }
  .mini-icon.blue { background: var(--sky); color: var(--primary); }
  .mini-icon.teal { background: #ccfbf1; color: var(--teal); }
  .mini-label { font-size: 0.78rem; color: var(--text-muted); }
  .mini-value { font-size: 0.95rem; font-weight: 600; color: var(--text-primary); }

  /* ── CATEGORIES QUICK ACCESS ── */
  .quick-categories {
    padding: 56px 0;
    background: white;
  }
  .section-label {
    font-size: 0.8rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--teal);
    margin-bottom: 10px;
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 8px;
  }
  .section-sub { font-size: 1rem; color: var(--text-secondary); margin-bottom: 40px; }
  .cat-card {
    background: var(--surface-2);
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius);
    padding: 28px 22px;
    text-align: center;
    cursor: pointer;
    transition: all 0.28s cubic-bezier(.4,0,.2,1);
    height: 100%;
  }
  .cat-card:hover {
    background: white;
    border-color: var(--primary-light);
    box-shadow: var(--shadow);
    transform: translateY(-4px);
  }
  .cat-icon {
    width: 60px; height: 60px;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    margin: 0 auto 16px;
  }
  .cat-title { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); margin-bottom: 6px; }
  .cat-desc { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; }

  /* ── TRUST INDICATORS ── */
  .trust-section {
    background: linear-gradient(135deg, var(--primary-dark), #0c4a6e 60%, #134e4a);
    padding: 56px 0;
    color: white;
  }
  .trust-stat-num {
    font-family: 'Fraunces', serif;
    font-size: 2.2rem; font-weight: 700; color: var(--primary-light);
  }
  .trust-stat-label { font-size: 0.88rem; color: rgba(255,255,255,0.7); margin-top: 4px; }
  .trust-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.85);
    margin: 4px;
  }

  /* ── CARDS GENERAL ── */
  .card-custom {
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    transition: all 0.25s;
  }
  .card-custom:hover { box-shadow: var(--shadow); border-color: var(--sky-mid); }
  .card-header-custom {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-body-custom { padding: 24px; }

  /* ── PRODUCTS PAGE ── */
  .products-hero {
    background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
    padding: 56px 0 40px;
  }
  .product-card {
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius-lg);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(.4,0,.2,1);
    height: 100%;
  }
  .product-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-lg);
    border-color: var(--primary-light);
  }
  .product-card-header {
    padding: 30px 28px 22px;
    position: relative;
    overflow: hidden;
  }
  .product-card-body { padding: 22px 28px 28px; }
  .product-icon-large {
    width: 64px; height: 64px;
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    margin-bottom: 16px;
  }
  .product-title { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 600; color: var(--primary-dark); margin-bottom: 8px; }
  .product-desc { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 16px; }
  .feature-list { list-style: none; padding: 0; }
  .feature-list li {
    font-size: 0.85rem; color: var(--text-secondary);
    padding: 5px 0;
    display: flex; align-items: center; gap: 8px;
  }
  .feature-list li::before {
    content: '✓';
    color: var(--teal);
    font-weight: 700;
    font-size: 0.8rem;
    width: 18px; height: 18px;
    background: #ccfbf1;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .price-tag {
    display: flex; align-items: baseline; gap: 4px; margin-top: 18px;
  }
  .price-from { font-size: 0.78rem; color: var(--text-muted); }
  .price-amount { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; color: var(--primary); }
  .price-period { font-size: 0.8rem; color: var(--text-muted); }
  .btn-card {
    width: 100%; padding: 11px;
    border-radius: 10px; border: none;
    font-weight: 600; font-size: 0.88rem;
    cursor: pointer; transition: all 0.22s;
    margin-top: 16px;
  }
  .btn-card-primary {
    background: linear-gradient(135deg, var(--primary), var(--teal));
    color: white;
    box-shadow: 0 4px 12px rgba(14,116,144,0.25);
  }
  .btn-card-primary:hover { box-shadow: 0 6px 18px rgba(14,116,144,0.38); transform: translateY(-1px); }
  .btn-card-outline {
    background: white; color: var(--primary);
    border: 1.5px solid var(--primary) !important;
  }
  .btn-card-outline:hover { background: var(--sky); }

  /* ── BADGE ── */
  .badge-custom {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 50px;
    font-size: 0.75rem; font-weight: 600;
  }
  .badge-blue { background: var(--sky); color: var(--primary); }
  .badge-teal { background: #ccfbf1; color: #0f766e; }
  .badge-green { background: #dcfce7; color: #15803d; }
  .badge-amber { background: #fef3c7; color: #d97706; }
  .badge-red { background: #fee2e2; color: #dc2626; }

  /* ── DASHBOARD ── */
  .dash-metric-card {
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius);
    padding: 22px 24px;
    transition: all 0.22s;
  }
  .dash-metric-card:hover { box-shadow: var(--shadow); }
  .metric-icon {
    width: 46px; height: 46px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; margin-bottom: 14px;
  }
  .metric-value {
    font-family: 'Fraunces', serif;
    font-size: 1.8rem; font-weight: 700;
    color: var(--primary-dark);
  }
  .metric-label { font-size: 0.83rem; color: var(--text-muted); margin-top: 4px; }
  .metric-change {
    font-size: 0.78rem; font-weight: 600;
    display: flex; align-items: center; gap: 4px;
    margin-top: 8px;
  }
  .metric-change.up { color: var(--success); }
  .metric-change.down { color: var(--danger); }

  .policy-row {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 0; border-bottom: 1px solid var(--border-light);
  }
  .policy-row:last-child { border-bottom: none; }
  .policy-icon-sm {
    width: 42px; height: 42px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .policy-info { flex: 1; min-width: 0; }
  .policy-name { font-weight: 600; font-size: 0.92rem; color: var(--text-primary); }
  .policy-number { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
  .policy-amount { text-align: right; }
  .policy-premium { font-weight: 600; font-size: 0.95rem; color: var(--primary-dark); }
  .policy-due { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

  /* ── PROGRESS BAR ── */
  .progress-custom {
    background: var(--border-light); height: 8px; border-radius: 10px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 10px;
    background: linear-gradient(90deg, var(--primary), var(--teal));
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
  }

  /* ── CLAIM STATUS TIMELINE ── */
  .timeline { position: relative; padding-left: 28px; }
  .timeline::before {
    content: ''; position: absolute; left: 8px; top: 8px; bottom: 8px;
    width: 2px; background: var(--border);
  }
  .timeline-item {
    position: relative; padding-bottom: 28px;
  }
  .timeline-item:last-child { padding-bottom: 0; }
  .timeline-dot {
    position: absolute; left: -24px; top: 2px;
    width: 18px; height: 18px;
    border-radius: 50%; border: 2.5px solid;
    background: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
  }
  .timeline-dot.completed { border-color: var(--teal); background: var(--teal); color: white; }
  .timeline-dot.active { border-color: var(--primary); background: var(--sky); color: var(--primary); }
  .timeline-dot.pending { border-color: var(--border); color: var(--text-muted); }
  .timeline-title { font-weight: 600; font-size: 0.9rem; color: var(--text-primary); }
  .timeline-date { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }
  .timeline-desc { font-size: 0.83rem; color: var(--text-secondary); margin-top: 6px; }

  /* ── CLAIM FORM ── */
  .form-label-custom {
    font-size: 0.88rem; font-weight: 600;
    color: var(--text-primary); margin-bottom: 8px; display: block;
  }
  .form-control-custom {
    width: 100%; padding: 11px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    color: var(--text-primary);
    background: white;
    transition: all 0.2s;
    outline: none;
  }
  .form-control-custom:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(14,116,144,0.1);
  }
  .form-control-custom::placeholder { color: var(--text-muted); }
  select.form-control-custom { cursor: pointer; }
  .upload-zone {
    border: 2px dashed var(--sky-mid);
    border-radius: var(--radius);
    padding: 36px 24px;
    text-align: center;
    background: var(--sky);
    cursor: pointer;
    transition: all 0.22s;
  }
  .upload-zone:hover { border-color: var(--primary); background: #e0f2fe; }
  .upload-icon { font-size: 2rem; margin-bottom: 10px; }
  .upload-title { font-weight: 600; color: var(--primary-dark); font-size: 0.95rem; }
  .upload-subtitle { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; }

  /* ── CALCULATOR ── */
  .calc-section {
    background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 60%, #ccfbf1 100%);
    padding: 60px 0;
  }
  .calc-card {
    background: white; border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border-light);
    overflow: hidden;
  }
  .calc-sidebar {
    background: linear-gradient(160deg, var(--primary-dark), #0c4a6e 60%, #134e4a);
    padding: 36px 32px;
    color: white;
    height: 100%;
  }
  .calc-sidebar-title {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem; font-weight: 700;
    margin-bottom: 12px; color: white;
  }
  .calc-sidebar-sub { font-size: 0.88rem; color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 28px; }
  .calc-result-box {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    margin-top: 20px;
  }
  .calc-result-label { font-size: 0.82rem; color: rgba(255,255,255,0.65); margin-bottom: 8px; }
  .calc-result-value {
    font-family: 'Fraunces', serif;
    font-size: 2.4rem; font-weight: 700;
    color: var(--primary-light);
  }
  .calc-result-period { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 4px; }
  .range-custom {
    width: 100%; height: 6px;
    border-radius: 10px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  .range-custom::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 2px 8px rgba(14,116,144,0.4);
    cursor: pointer;
    border: 2px solid white;
  }
  .plan-option {
    border: 1.5px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 10px;
    font-size: 0.88rem; font-weight: 500;
  }
  .plan-option:hover { border-color: var(--primary); background: var(--sky); }
  .plan-option.selected { border-color: var(--primary); background: var(--sky); color: var(--primary); }
  .plan-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .plan-option.selected .plan-radio { border-color: var(--primary); background: var(--primary); }
  .plan-option.selected .plan-radio::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: white; }

  /* ── POLICY DETAIL ── */
  .policy-detail-hero {
    background: linear-gradient(135deg, var(--primary-dark), #0c4a6e 50%, #134e4a);
    padding: 56px 0 48px;
    color: white;
  }
  .coverage-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 16px 0; border-bottom: 1px solid var(--border-light);
  }
  .coverage-item:last-child { border-bottom: none; }
  .coverage-icon {
    width: 38px; height: 38px; border-radius: 10px;

  .coverage-title { font-weight: 600; font-size: 0.92rem; color: var(--text-primary); }

  .coverage-amount { font-weight: 700; color: var(--primary); font-size: 0.95rem; text-align: right; white-space: nowrap; }

  /* ── COMPARISON ── */
  .compare-table {
    width: 100%; border-collapse: collapse;

  }
  .compare-table th {
    background: var(--primary-dark); color: white;

  .compare-table td {

  .compare-table td:first-child { text-align: left; color: var(--text-secondary); font-weight: 500; }
  .compare-table tr:hover td { background: var(--sky); }

  .check-yes { color: var(--teal); font-size: 1rem; }

  /* ── AI RECOMMENDER ── */
  .ai-section { background: var(--surface-2); padding: 60px 0; }

    background: white;
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border-light);

    display: flex; align-items: center; gap: 16px;

  .ai-icon-big {

  .ai-title { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }

  .step-indicator {

  .step-dot {

  }

  .rec-plan-card {
    border: 1.5px solid var(--border-light);

    position: relative; overflow: hidden;
  }
  .rec-plan-card.best {
    border-color: var(--primary);
    background: var(--sky);
  }
  .rec-badge {
    position: absolute; top: 12px; right: 12px;
    background: var(--primary); color: white;
    font-size: 0.7rem; font-weight: 700;
    padding: 3px 9px; border-radius: 50px;
  }
  .match-percent {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem; font-weight: 700; color: var(--primary);
  }

  /* ── CONTACT ── */
  .contact-section { padding: 60px 0; background: white; }
  .support-card {
    background: var(--surface-2);
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius-lg);

    text-align: center;
    transition: all 0.25s;
    cursor: pointer;
    height: 100%;
  }
  .support-card:hover { box-shadow: var(--shadow); transform: translateY(-3px); border-color: var(--sky-mid); background: white; }
  .support-icon {
    width: 64px; height: 64px; border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    margin: 0 auto 18px;
  }
  .faq-item {
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius); margin-bottom: 10px;
    overflow: hidden; transition: all 0.22s;
  }
  .faq-header {
    padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; font-weight: 600; font-size: 0.92rem;
    background: white; transition: background 0.2s;
  }
  .faq-header:hover { background: var(--sky); }
  .faq-body { padding: 0 20px; max-height: 0; overflow: hidden; transition: all 0.3s; }
  .faq-body.open { max-height: 200px; padding: 0 20px 16px; }
  .faq-body p { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.6; }
  .faq-arrow { transition: transform 0.3s; font-size: 0.75rem; color: var(--text-muted); }
  .faq-item.open .faq-arrow { transform: rotate(180deg); }

  /* ── DOCUMENT VAULT ── */
  .vault-section { background: var(--surface); padding: 60px 0; }
  .doc-item {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px;
    background: white;
    border: 1.5px solid var(--border-light);
    border-radius: var(--radius-sm);
    margin-bottom: 10px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .doc-item:hover { border-color: var(--sky-mid); box-shadow: var(--shadow-sm); }
  .doc-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
  .doc-name { font-weight: 600; font-size: 0.9rem; color: var(--text-primary); }
  .doc-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
  .doc-actions { margin-left: auto; display: flex; gap: 8px; }
  .btn-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--surface-2); border: 1px solid var(--border-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; cursor: pointer; transition: all 0.18s;
    color: var(--text-secondary);
  }
  .btn-icon:hover { background: var(--sky); color: var(--primary); }

  /* ── FOOTER ── */
  .footer {
    background: var(--primary-dark);
    color: rgba(255,255,255,0.75);
    padding: 48px 0 28px;
  }
  .footer-brand {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem; font-weight: 700; color: white;
    margin-bottom: 10px;
  }
  .footer-tagline { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
  .footer-link {
    display: block; color: rgba(255,255,255,0.6);
    font-size: 0.85rem; text-decoration: none;
    margin-bottom: 8px; transition: color 0.18s;
  }
  .footer-link:hover { color: var(--primary-light); }
  .footer-heading { font-weight: 600; color: rgba(255,255,255,0.9); font-size: 0.88rem; margin-bottom: 14px; }
  .footer-divider { border-color: rgba(255,255,255,0.1); margin: 28px 0 20px; }
  .footer-bottom { font-size: 0.8rem; color: rgba(255,255,255,0.4); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

  /* ── NOTIFICATION BELL ── */
  .notif-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--surface-2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative; transition: all 0.18s;
    font-size: 1rem; color: var(--text-secondary);
  }
  .notif-btn:hover { background: var(--sky); color: var(--primary); }
  .notif-dot {
    position: absolute; top: 6px; right: 6px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--danger); border: 2px solid white;
  }
  .avatar-btn {
    width: 38px; height: 38px; border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), var(--teal));
    color: white; font-weight: 700; font-size: 0.88rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  /* ── RENEWAL REMINDER ── */
  .renewal-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 0; border-bottom: 1px solid var(--border-light);
  }
  .renewal-item:last-child { border-bottom: none; }
  .renewal-urgency {
    width: 5px; height: 44px; border-radius: 10px; flex-shrink: 0;
  }
  .renewal-days { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); }
  .renewal-days-label { font-size: 0.75rem; color: var(--text-muted); }
  .renewal-name { font-weight: 600; font-size: 0.9rem; color: var(--text-primary); }
  .renewal-date { font-size: 0.8rem; color: var(--text-muted); margin-top: 3px; }

  /* ── GENERAL UTILS ── */
  .divider { border: none; border-top: 1px solid var(--border-light); margin: 24px 0; }
  .text-primary-brand { color: var(--primary) !important; }
  .text-teal { color: var(--teal) !important; }
  .bg-sky { background: var(--sky); }
  .gap-2 { gap: 8px; }
  .scrollbar-hide { scrollbar-width: none; }
  .scrollbar-hide::-webkit-scrollbar { display: none; }

  /* ── MOBILE NAV ── */
  .mobile-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid var(--border-light);
    display: none;
    justify-content: space-around;
    padding: 10px 0 env(safe-area-inset-bottom);
    z-index: 999;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
  }
  .mobile-nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 12px; border-radius: 10px;
    cursor: pointer; border: none; background: none;
    transition: all 0.18s; color: var(--text-muted); font-size: 0.7rem; font-weight: 500;
  }
  .mobile-nav-btn .icon { font-size: 1.2rem; }
  .mobile-nav-btn.active, .mobile-nav-btn:hover { color: var(--primary); }
  @media (max-width: 768px) {
    .mobile-nav { display: flex; }
    body { padding-bottom: 74px; }
    .desktop-nav { display: none !important; }
    .hero-section { padding: 50px 0 40px; }
    .hero-stats { gap: 20px; }
    .hero-card-mini { display: none; }
  }
  @media (min-width: 769px) {
    .desktop-nav { display: flex !important; }
  }

  /* ── CHAT WIDGET ── */
  .chat-fab {
    position: fixed; bottom: 90px; right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--teal));
    color: white; font-size: 1.3rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 6px 20px rgba(14,116,144,0.4);
    border: none; transition: all 0.25s; z-index: 998;
  }
  .chat-fab:hover { transform: scale(1.1); box-shadow: 0 8px 28px rgba(14,116,144,0.5); }
  @media (min-width: 769px) { .chat-fab { bottom: 24px; } }

  .chat-window {
    position: fixed; bottom: 80px; right: 20px;
    width: 320px; max-height: 420px;
    background: white; border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg); border: 1px solid var(--border-light);
    z-index: 999; display: none; flex-direction: column;
    overflow: hidden;
  }
  @media (min-width: 769px) { .chat-window { bottom: 88px; } }
  .chat-window.open { display: flex; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .chat-header {
    background: linear-gradient(135deg, var(--primary), var(--teal));
    padding: 16px 20px; color: white;
    display: flex; align-items: center; gap: 12px;
  }
  .chat-agent-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .chat-body { flex: 1; overflow-y: auto; padding: 16px; background: var(--surface-2); display: flex; flex-direction: column; gap: 10px; }
  .chat-msg {
    max-width: 80%; padding: 10px 14px;
    border-radius: 16px; font-size: 0.85rem; line-height: 1.5;
  }
  .chat-msg.agent { background: white; border: 1px solid var(--border-light); color: var(--text-primary); border-bottom-left-radius: 4px; align-self: flex-start; }
  .chat-msg.user { background: var(--primary); color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
  .chat-footer { padding: 12px 16px; border-top: 1px solid var(--border-light); display: flex; gap: 8px; }
  .chat-input {
    flex: 1; border: 1.5px solid var(--border); border-radius: 20px;
    padding: 8px 14px; font-size: 0.85rem; outline: none;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--primary); }
  .chat-send {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--primary); color: white; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
  }
  .chat-send:hover { background: var(--primary-dark); }
</style>
